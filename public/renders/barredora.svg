<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <!-- Surface -->
  <rect width="400" height="180" fill="#ECEEF2"/>

  <!-- FRONT WHEELS (zone: tren_rodaje, x 0-10%) -->
  <rect x="8" y="20" width="28" height="48" rx="7" fill="#282828" stroke="#111" stroke-width="1.5"/>
  <rect x="13" y="26" width="18" height="36" rx="4" fill="#3C3C3C"/>
  <rect x="8" y="112" width="28" height="48" rx="7" fill="#282828" stroke="#111" stroke-width="1.5"/>
  <rect x="13" y="118" width="18" height="36" rx="4" fill="#3C3C3C"/>

  <!-- REAR WHEELS dual axle -->
  <rect x="308" y="14" width="22" height="38" rx="5" fill="#282828" stroke="#111" stroke-width="1.5"/>
  <rect x="334" y="14" width="22" height="38" rx="5" fill="#282828" stroke="#111" stroke-width="1.5"/>
  <rect x="308" y="128" width="22" height="38" rx="5" fill="#282828" stroke="#111" stroke-width="1.5"/>
  <rect x="334" y="128" width="22" height="38" rx="5" fill="#282828" stroke="#111" stroke-width="1.5"/>

  <!-- MAIN BODY FRAME -->
  <rect x="36" y="26" width="336" height="128" rx="10" fill="#E0E4EE" stroke="#A0AECC" stroke-width="2"/>

  <!-- ZONE 2: CAB / MOTOR (x 10-36%) -->
  <rect x="40" y="30" width="100" height="120" rx="8" fill="#CDD6EC" stroke="#8898BE" stroke-width="1.5"/>
  <rect x="51" y="43" width="66" height="33" rx="5" fill="#A4C4E8" stroke="#6688B8" stroke-width="1.2" opacity="0.9"/>
  <line x1="140" y1="30" x2="140" y2="150" stroke="#8898BE" stroke-width="1.5"/>
  <rect x="47" y="88" width="56" height="26" rx="3" fill="none" stroke="#B09058" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="75" y="104" text-anchor="middle" font-size="8" fill="#806038" font-family="Arial,sans-serif" font-weight="bold">MOTOR</text>

  <!-- ZONE 3: BODY / DEPOSITO (x 36-74%) -->
  <rect x="146" y="34" width="148" height="112" rx="5" fill="#D8E2EE" stroke="#96A6BE" stroke-width="1.2"/>
  <ellipse cx="220" cy="90" rx="54" ry="37" fill="#BAD0EC" stroke="#6080BC" stroke-width="1.5"/>
  <text x="220" y="86" text-anchor="middle" font-size="8" fill="#204880" font-family="Arial,sans-serif" font-weight="bold">DEPÓSITO</text>
  <text x="220" y="97" text-anchor="middle" font-size="7.5" fill="#204880" font-family="Arial,sans-serif">DE AGUA</text>

  <!-- ZONE 4: CEPILLOS LATERALES (x 74-84%) -->
  <circle cx="314" cy="50" r="22" fill="#D0ECC8" stroke="#60A050" stroke-width="1.5"/>
  <circle cx="314" cy="50" r="14" fill="#BCE8B4" stroke="#60A050" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="314" cy="50" r="4" fill="#60A050"/>
  <text x="314" y="48" text-anchor="middle" font-size="6.5" fill="#285020" font-family="Arial,sans-serif" font-weight="bold">CEP</text>
  <text x="314" y="57" text-anchor="middle" font-size="6.5" fill="#285020" font-family="Arial,sans-serif">LAT</text>
  <circle cx="314" cy="130" r="22" fill="#D0ECC8" stroke="#60A050" stroke-width="1.5"/>
  <circle cx="314" cy="130" r="14" fill="#BCE8B4" stroke="#60A050" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="314" cy="130" r="4" fill="#60A050"/>
  <text x="314" y="128" text-anchor="middle" font-size="6.5" fill="#285020" font-family="Arial,sans-serif" font-weight="bold">CEP</text>
  <text x="314" y="137" text-anchor="middle" font-size="6.5" fill="#285020" font-family="Arial,sans-serif">LAT</text>

  <!-- ZONE 5: CEPILLO PRINCIPAL (x 84-97%) -->
  <rect x="340" y="30" width="28" height="120" rx="5" fill="#C0E8B8" stroke="#50A040" stroke-width="1.5"/>
  <line x1="344" y1="44" x2="364" y2="44" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="54" x2="364" y2="54" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="64" x2="364" y2="64" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="74" x2="364" y2="74" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="84" x2="364" y2="84" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="94" x2="364" y2="94" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="104" x2="364" y2="104" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="114" x2="364" y2="114" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <line x1="344" y1="124" x2="364" y2="124" stroke="#50A040" stroke-width="1" opacity="0.7"/>
  <text x="354" y="100" text-anchor="middle" font-size="6.5" fill="#1E5018" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 354 90)">C.PRINCIPAL</text>
</svg>
