<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Audio Geofence - RMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #3D5229;
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .test-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .test-btn {
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            border: 3px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
        }

        .test-btn:hover {
            border-color: #3D5229;
            box-shadow: 0 8px 24px rgba(61, 82, 41, 0.2);
            transform: translateY(-4px);
        }

        .test-btn:active {
            transform: translateY(-2px);
        }

        .test-btn--enter {
            border-color: #10b981;
        }

        .test-btn--enter:hover {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border-color: #10b981;
        }

        .test-btn--exit {
            border-color: #ef4444;
        }

        .test-btn--exit:hover {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border-color: #ef4444;
        }

        .btn-icon {
            font-size: 40px;
            flex-shrink: 0;
        }

        .btn-content {
            flex: 1;
            text-align: left;
        }

        .btn-label {
            display: block;
            font-weight: 600;
            font-size: 18px;
            color: #111827;
            margin-bottom: 6px;
        }

        .btn-message {
            display: block;
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
        }

        .note {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #78350f;
            font-size: 14px;
            line-height: 1.6;
        }

        .note-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            background: #f3f4f6;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.active {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border: 2px solid #3b82f6;
            color: #1e40af;
            font-weight: 600;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .playing {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔊 Prueba de Audio Geofence</h1>
            <p>Sistema de alertas de área segura - RMP</p>
        </div>

        <div class="test-buttons">
            <button class="test-btn test-btn--enter" onclick="testEnter()">
                <span class="btn-icon">🔔</span>
                <div class="btn-content">
                    <span class="btn-label">Entrada a Zona Segura</span>
                    <span class="btn-message">🎤 Reproduce: "como van?"</span>
                </div>
            </button>

            <button class="test-btn test-btn--exit" onclick="testExit()">
                <span class="btn-icon">📤</span>
                <div class="btn-content">
                    <span class="btn-label">Salida de Zona Segura</span>
                    <span class="btn-message">🎤 Reproduce: "se fue"</span>
                </div>
            </button>
        </div>

        <div class="note">
            <span class="note-icon">💡</span>
            <span>Si no escuchas nada, haz click en cualquier parte de la página primero. Los navegadores bloquean el audio automático hasta que el usuario interactúe con la página.</span>
        </div>

        <div id="status" class="status">
            ⚡ Listo para probar
        </div>
    </div>

    <script>
        // Función para mostrar estado
        function showStatus(message, isPlaying = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;

            if (isPlaying) {
                statusEl.classList.add('active', 'playing');
            } else {
                statusEl.classList.remove('active', 'playing');
            }
        }

        // Función para reproducir beep
        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800; // Frecuencia de 800 Hz
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3; // Volumen 30%

                oscillator.start();

                // Fade out
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.stop(audioContext.currentTime + 0.3);

                console.log('🔊 Beep reproducido');
            } catch (error) {
                console.error('❌ Error reproduciendo beep:', error);
                alert('Error reproduciendo sonido: ' + error.message);
            }
        }

        // Función para hablar usando Web Speech API
        function speakAlert(message, isEntering) {
            try {
                // Verificar si el navegador soporta Web Speech API
                if (!window.speechSynthesis) {
                    alert('❌ Tu navegador no soporta síntesis de voz (Web Speech API)');
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(message);

                // Configurar voz en español
                utterance.lang = 'es-ES';

                // Ajustar parámetros según tipo de evento
                if (isEntering) {
                    utterance.rate = 1.2;    // Más rápido para entrada
                    utterance.pitch = 1.1;   // Más agudo
                } else {
                    utterance.rate = 1.0;    // Normal para salida
                    utterance.pitch = 0.9;   // Más grave para salida
                }

                utterance.volume = 0.8; // Volumen 80%

                // Evento cuando comienza a hablar
                utterance.onstart = () => {
                    console.log(`🎤 Iniciando síntesis de voz: "${message}"`);
                    showStatus(`🎤 Reproduciendo: "${message}"`, true);
                };

                // Evento cuando termina de hablar
                utterance.onend = () => {
                    console.log('✅ Síntesis de voz completada');
                    setTimeout(() => {
                        showStatus('⚡ Listo para probar');
                    }, 1000);
                };

                // Evento de error
                utterance.onerror = (event) => {
                    console.error('❌ Error en síntesis de voz:', event.error);
                    showStatus('❌ Error: ' + event.error);
                };

                // Hablar
                window.speechSynthesis.speak(utterance);

            } catch (error) {
                console.error('❌ Error en Web Speech API:', error);
                alert('Error reproduciendo voz: ' + error.message);
                showStatus('❌ Error reproduciendo voz');
            }
        }

        // Simular entrada a zona segura
        function testEnter() {
            console.log('🧪 [TEST] Simulando ENTRADA a zona segura');
            showStatus('🔊 Reproduciendo beep...', true);

            playBeep();

            setTimeout(() => {
                speakAlert('como van?', true);
            }, 100);
        }

        // Simular salida de zona segura
        function testExit() {
            console.log('🧪 [TEST] Simulando SALIDA de zona segura');
            showStatus('🔊 Reproduciendo beep...', true);

            playBeep();

            setTimeout(() => {
                speakAlert('se fue', false);
            }, 100);
        }

        // Mensaje de bienvenida en consola
        console.log(`
╔════════════════════════════════════════╗
║   🔊 RMP - Prueba de Audio Geofence   ║
╚════════════════════════════════════════╝

📋 Instrucciones:
  1. Haz click en uno de los botones para probar
  2. El sistema reproducirá:
     - Beep de 800 Hz (0.3 segundos)
     - Mensaje de voz en español

🎤 Mensajes de voz:
  • Entrada: "como van?" (voz aguda, rápida)
  • Salida: "se fue" (voz grave, normal)

⚠️ Nota: Si no escuchas nada, haz click en la página primero.
`);
    </script>
</body>
</html>
